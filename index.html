<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>北艺美术学院教职工形象画册 2015-2024</title>
<style>
:root {
  --bg:#f7f8fb; --card:#ffffff; --ink:#162033; --muted:#657085;
  --blue:#0876a7; --cyan:#16b8b2; --pink:#ff3c74; --orange:#ffb01f;
  --shadow:0 18px 50px rgba(16,31,59,.10); --radius:24px;
}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:
radial-gradient(circle at 16% 10%,rgba(22,184,178,.22),transparent 28%),
radial-gradient(circle at 88% 3%,rgba(255,60,116,.18),transparent 30%),
linear-gradient(180deg,#eef9fb 0%,var(--bg) 36%);}
.hero{min-height:430px;display:grid;grid-template-columns:1.05fr .95fr;gap:36px;align-items:center;padding:58px min(7vw,96px) 38px;}
.kicker{display:inline-flex;gap:10px;align-items:center;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.72);backdrop-filter:blur(10px);color:var(--blue);font-weight:700;}
h1{font-size:clamp(36px,6vw,74px);line-height:1.02;margin:24px 0 14px;letter-spacing:-.05em}
.hero p{font-size:18px;line-height:1.8;color:var(--muted);max-width:650px}
.cover{position:relative;border-radius:34px;overflow:hidden;background:#0c89a3;box-shadow:var(--shadow);transform:rotate(1.5deg)}
.cover img{display:block;width:100%;aspect-ratio:1/1;object-fit:cover}
.cover:after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,transparent 45%,rgba(255,255,255,.32));mix-blend-mode:overlay}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:0 min(7vw,96px) 34px}
.metric{background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.72);border-radius:22px;padding:20px;box-shadow:0 10px 24px rgba(16,31,59,.06)}
.metric b{font-size:34px;display:block} .metric span{color:var(--muted);font-size:14px}
.toolbar{position:sticky;top:0;z-index:5;padding:14px min(7vw,96px);background:rgba(247,248,251,.78);backdrop-filter:blur(16px);border-block:1px solid rgba(134,147,171,.18);display:grid;grid-template-columns:1fr auto auto auto auto;gap:12px}
input,select{border:1px solid #dbe2ec;background:white;border-radius:16px;padding:13px 14px;font-size:15px;outline:none}
.section{padding:42px min(7vw,96px)}
.section h2{font-size:30px;margin:0 0 18px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.bar{display:grid;grid-template-columns:110px 1fr 44px;gap:12px;align-items:center;margin:12px 0;color:#344054;cursor:pointer;border-radius:14px;padding:4px 6px;transition:.18s ease}
.bar:hover{background:#f6f9fc;transform:translateX(2px)}
.track{height:14px;background:#edf1f6;border-radius:999px;overflow:hidden} .fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--blue),var(--pink));border-radius:999px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:22px}
.card{background:var(--card);border-radius:26px;overflow:hidden;box-shadow:0 12px 30px rgba(16,31,59,.08);transition:.25s ease;position:relative}
.card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(16,31,59,.14)}

.photo{width:100%;aspect-ratio:1/1.15;object-fit:cover;object-position:top;background:#fff;cursor:zoom-in;transition:.2s ease}
.photo:hover{filter:saturate(1.06) contrast(1.03)}
.lightbox{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:28px;background:rgba(8,15,28,.82);backdrop-filter:blur(10px)}
.lightbox.open{display:flex}
.lightbox-dialog{position:relative;max-width:min(92vw,980px);max-height:92vh;background:#fff;border-radius:24px;box-shadow:0 28px 90px rgba(0,0,0,.35);overflow:hidden}
.lightbox img{display:block;max-width:100%;max-height:82vh;object-fit:contain;background:#fff}
.lightbox-caption{padding:14px 18px;color:var(--ink);font-weight:800;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.lightbox-caption span{font-size:14px;color:var(--muted);font-weight:600}
.lightbox-close{position:absolute;top:12px;right:12px;width:42px;height:42px;border:0;border-radius:999px;background:rgba(255,255,255,.9);color:#162033;font-size:26px;line-height:1;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.18)}
.lightbox-close:hover{background:white;transform:scale(1.04)}
@media (max-width:640px){.lightbox{padding:14px}.lightbox-dialog{border-radius:18px}.lightbox img{max-height:78vh}}

.info{padding:16px 18px 18px} .name{font-size:22px;font-weight:800;margin-bottom:8px}
.tag{display:inline-block;margin:4px 4px 4px 0;padding:6px 10px;border-radius:999px;background:#eef9fb;color:var(--blue);font-size:12px;font-weight:700}
.meta{font-size:13px;color:var(--muted);line-height:1.7;margin-top:8px}

.actions{display:flex;flex-wrap:wrap;gap:12px;padding:18px min(7vw,96px) 0}
.action-btn,.detail-btn,.mini-card{border:0;border-radius:999px;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-weight:800;cursor:pointer;box-shadow:0 10px 24px rgba(8,118,167,.18);transition:.18s ease}
.action-btn{padding:13px 18px;font-size:15px}.action-btn.secondary{background:#fff;color:var(--blue);border:1px solid #dbe2ec;box-shadow:0 8px 20px rgba(16,31,59,.06)}
.action-btn:hover,.detail-btn:hover,.mini-card:hover{transform:translateY(-2px)}
.detail-btn{margin-top:12px;padding:10px 14px;font-size:13px}
.timeline-section{display:none}.timeline{position:relative;display:grid;gap:22px}.timeline-year{display:grid;grid-template-columns:110px 1fr;gap:18px;align-items:start}.year-badge{position:sticky;top:88px;background:#fff;border-radius:18px;padding:14px;text-align:center;box-shadow:var(--shadow);font-size:24px;font-weight:900;color:var(--blue)}
.timeline-people{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}.timeline-person{background:#fff;border:1px solid #edf1f6;border-radius:20px;padding:12px;display:grid;grid-template-columns:54px 1fr;gap:10px;align-items:center;cursor:pointer;box-shadow:0 8px 22px rgba(16,31,59,.06);transition:.18s ease}.timeline-person:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(16,31,59,.12)}
.timeline-person img{width:54px;height:62px;border-radius:14px;object-fit:cover;object-position:top;background:#fff}.timeline-person b{display:block}.timeline-person span{font-size:12px;color:var(--muted)}
.person-modal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(8,15,28,.72);backdrop-filter:blur(10px)}.person-modal.open{display:flex}
.person-dialog{position:relative;width:min(1040px,94vw);max-height:90vh;overflow:auto;background:#fff;border-radius:28px;box-shadow:0 30px 90px rgba(0,0,0,.32)}.person-close{position:sticky;top:14px;float:right;margin:14px 14px 0 0;z-index:2;width:42px;height:42px;border:0;border-radius:999px;background:#f2f5f9;font-size:26px;cursor:pointer}.person-body{display:grid;grid-template-columns:minmax(260px,360px) 1fr;gap:24px;padding:28px}.person-portrait{width:100%;border-radius:24px;object-fit:cover;object-position:top;box-shadow:0 14px 36px rgba(16,31,59,.13)}.person-title{font-size:34px;font-weight:900;margin:4px 0 8px}.detail-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:18px 0}.detail-item{background:#f7fafc;border-radius:16px;padding:12px;color:#344054}.detail-item b{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}.relation-block{margin-top:18px}.relation-block h4{margin:0 0 10px}.relation-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}.mini-card{display:grid;grid-template-columns:42px 1fr;gap:9px;align-items:center;text-align:left;border-radius:16px;padding:8px;background:#f7fafc;color:var(--ink);box-shadow:none;border:1px solid #edf1f6}.mini-card img{width:42px;height:48px;border-radius:12px;object-fit:cover;object-position:top}.mini-card span{display:block;font-size:12px;color:var(--muted)}
@media (max-width:760px){.timeline-year{grid-template-columns:1fr}.year-badge{position:static;text-align:left}.person-body{grid-template-columns:1fr}.detail-list{grid-template-columns:1fr}}

.empty{display:none;text-align:center;color:var(--muted);padding:44px}
@media (max-width:900px){.hero,.charts{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr}}
</style>

<style id="relation-force-visible">
.relation-panel,
.relationship-panel,
#relation,
#relations{
  display:block !important;
  opacity:1 !important;
  visibility:visible !important;
  max-height:none !important;
}
</style>

</head>

    <div class="panel"><h3>学历分类</h3><div id="eduChart"></div></div>
  </div>
</section>
<section class="section">

  <div id="grid" class="grid"></div>
  <div id="empty" class="empty">没有找到匹配结果</div>
</section>

<div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="照片大图预览">
  <div class="lightbox-dialog">
    <button id="lightboxClose" class="lightbox-close" type="button" aria-label="关闭大图">×</button>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-caption"><strong id="lightboxName"></strong><span id="lightboxMeta"></span></div>
  </div>
</div>

<div id="personModal" class="person-modal" aria-hidden="true" role="dialog" aria-label="人物详情">

    <div id="personBody" class="person-body"></div>
  </div>
</div>

const stats = {"total": 104, "earliest_join": "2015-08", "latest_join": "2024-02", "avg_birth": 1992.0, "dept_counts": {"美术学教研室": 19, "绘画教研室": 35, "书法教研室": 15, "雕塑教研室": 13, "行政办": 9, "摄影教研室": 13}, "join_counts": {"2015": 4, "2016": 2, "2017": 4, "2018": 13, "2019": 10, "2020": 5, "2021": 15, "2022": 37, "2023": 13, "2024": 1}, "edu_counts": {"硕士研究生": 96, "大学本科": 6, "大专": 1, "中专": 1}};


function getRegion(school){
  if(!school) return '未标注';
  const s = school.trim();
  const overseas = ['美国','俄罗斯','白俄罗斯','澳大利亚','诺丁汉','涅任','莫吉廖夫','卡拉拉'];
  if(overseas.some(k => s.includes(k))) return '海外院校';
  const map = [
    ['广西','广西'],['北海','广西'],['南宁','广西'],['玉林','广西'],
    ['北京','北京'],['中国艺术研究院','北京'],['中央美术学院','北京'],['首都师范','北京'],['北京印刷','北京'],['北京城市','北京'],
    ['上海','上海'],['天津','天津'],['重庆','重庆'],
    ['陕西','陕西'],['西安','陕西'],['山西','山西'],['内蒙古','内蒙古'],
    ['吉林','吉林'],['东北师范','吉林'],['黑龙江','黑龙江'],['哈尔滨','黑龙江'],['辽宁','辽宁'],['沈阳','辽宁'],['鲁迅美术','辽宁'],
    ['河南','河南'],['山东','山东'],['南通','江苏'],['南京','江苏'],['浙江','浙江'],
    ['湖南','湖南'],['中南大学','湖南'],['湖北','湖北'],['贵州','贵州'],['四川','四川'],['广州','广东'],['西南大学','重庆'],['西北大学','陕西'],['西北民族','甘肃']
  ];
  for(const [k,v] of map){ if(s.includes(k)) return v; }
  return '其他地区';
}
function getEduGroup(edu){
  const e = edu || '未标注';
  if(e.includes('硕士')) return '硕士研究生';
  if(e.includes('本科')) return '大学本科';
  if(e.includes('大专')) return '大专';
  if(e.includes('中专')) return '中专';
  return e;
}
people.forEach(p => { p.region = getRegion(p.school); p.eduGroup = getEduGroup(p.edu); });
stats.region_counts = people.reduce((acc,p)=>{ acc[p.region]=(acc[p.region]||0)+1; return acc; },{});
stats.edu_group_counts = people.reduce((acc,p)=>{ acc[p.eduGroup]=(acc[p.eduGroup]||0)+1; return acc; },{});

const $ = s => document.querySelector(s);
const fmt = s => s ? s.replace('-', '年') + '月' : '—';

function countBy(list, getter){
  return list.reduce((acc, item) => {
    const key = getter(item) || '未标注';
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});
}

function updateMetrics(list){
  const joins = list.map(p => p.join).filter(Boolean).sort();
  $('#mTotal').textContent = list.length;
  $('#mDept').textContent = new Set(list.map(p => p.dept).filter(Boolean)).size;
  $('#mFirst').textContent = joins.length ? joins[0].slice(0,4) : '—';
  $('#mLatest').textContent = joins.length ? joins[joins.length - 1].slice(0,4) : '—';
}

function fillOptions(){
  Object.keys(stats.dept_counts).sort().forEach(d => $('#dept').insertAdjacentHTML('beforeend', `<option>${d}</option>`));
  Object.keys(stats.join_counts).sort().forEach(y => $('#year').insertAdjacentHTML('beforeend', `<option>${y}</option>`));
  Object.keys(stats.region_counts).sort((a,b)=>stats.region_counts[b]-stats.region_counts[a]).forEach(r => $('#region').insertAdjacentHTML('beforeend', `<option>${r}</option>`));
  Object.keys(stats.edu_group_counts).sort((a,b)=>stats.edu_group_counts[b]-stats.edu_group_counts[a]).forEach(e => $('#edu').insertAdjacentHTML('beforeend', `<option>${e}</option>`));
}

function renderBars(el, obj, filterId){
  const entries = Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){
    $(el).innerHTML = '<div class="empty" style="display:block;padding:24px">暂无数据</div>';
    return;
  }
  const max = Math.max(...entries.map(([,v]) => v));
  $(el).innerHTML = entries.map(([k,v])=>`
    <div class="bar" role="button" tabindex="0" data-filter="${filterId}" data-value="${k}" title="点击筛选：${k}">
      <span>${k}</span><div class="track"><div class="fill" style="width:${v/max*100}%"></div></div><b>${v}</b>
    </div>
  `).join('');
}

function renderOverview(list){
  updateMetrics(list);
  renderBars('#deptChart', countBy(list, p => p.dept), 'dept');
  renderBars('#yearChart', countBy(list, p => p.join ? p.join.slice(0,4) : '未标注'), 'year');
  renderBars('#regionChart', countBy(list, p => p.region), 'region');
  renderBars('#eduChart', countBy(list, p => p.eduGroup), 'edu');
}

function imgSrc(p){ return `images/page-${String(p.page).padStart(3,'0')}.jpg`; }
function card(p){
  return `<article class="card" data-page="${p.page}">
    <img class="photo" loading="lazy" src="${imgSrc(p)}" alt="${p.name}" data-name="${p.name}" data-dept="${p.dept || '未标注部门'}" data-page="${p.page}" title="点击查看${p.name}照片大图" tabindex="0" role="button">
    <div class="info">
      <div class="name">${p.name}</div>
      <span class="tag">${p.dept || '未标注部门'}</span><span class="tag">${p.eduGroup || '学历未标注'}</span><span class="tag">${p.region || '地域未标注'}</span>
      <div class="meta">
        出生年月：${fmt(p.birth)}<br>
        入职时间：${fmt(p.join)}<br>
        毕业院校：${p.school || '—'}<br>
        地域分类：${p.region || '—'}<br>
        原画册页码：P${p.page}
      </div>
      <button class="detail-btn" type="button" data-detail="${p.page}">查看详情与人物关系</button>
    </div>
  </article>`;
}

function getFilteredPeople(){
  const q = $('#q').value.trim().toLowerCase();
  const dept = $('#dept').value;
  const year = $('#year').value;
  const region = $('#region').value;
  const edu = $('#edu').value;
  return people.filter(p => 
    (!dept || p.dept === dept) &&
    (!year || p.join.startsWith(year)) &&
    (!region || p.region === region) &&
    (!edu || p.eduGroup === edu) &&
    (!q || [p.name,p.dept,p.school,p.edu,p.eduGroup,p.region,p.birth,p.join].join(' ').toLowerCase().includes(q))
  );
}

function renderTimeline(list){
  const groups = list.slice().sort((a,b)=>(a.join||'9999').localeCompare(b.join||'9999')).reduce((acc,p)=>{
    const y = p.join ? p.join.slice(0,4) : '未标注';
    (acc[y] ||= []).push(p);
    return acc;
  }, {});
  $('#timeline').innerHTML = Object.entries(groups).map(([year,items])=>`
    <div class="timeline-year">
      <div class="year-badge">${year}<br><small>${items.length} 人</small></div>
      <div class="timeline-people">${items.map(p=>`
        <div class="timeline-person" role="button" tabindex="0" data-detail="${p.page}" title="查看${p.name}详情">
          <img src="${imgSrc(p)}" alt="${p.name}"><div><b>${p.name}</b><span>${fmt(p.join)} · ${p.dept || '未标注部门'}</span></div>
        </div>`).join('')}</div>
    </div>`).join('');
}
function render(){
  const list = getFilteredPeople();
  renderOverview(list);
  $('#grid').innerHTML = list.map(card).join('');
  renderTimeline(list);
  $('#empty').style.display = list.length ? 'none' : 'block';
}


function relationMatches(p){
  const sameDept = people.filter(x => x.page !== p.page && x.dept === p.dept).slice(0,6);
  const sameYear = people.filter(x => x.page !== p.page && x.join && p.join && x.join.slice(0,4) === p.join.slice(0,4)).slice(0,6);
  const sameSchool = people.filter(x => x.page !== p.page && x.school && p.school && x.school === p.school).slice(0,6);
  const sameRegion = people.filter(x => x.page !== p.page && x.region && p.region && x.region === p.region).slice(0,6);
  return {sameDept, sameYear, sameSchool, sameRegion};
}
function miniCards(list, emptyText='暂无匹配人物'){
  if(!list.length) return `<div class="meta">${emptyText}</div>`;
  return `<div class="relation-grid">${list.map(p=>`
    <button class="mini-card" type="button" data-detail="${p.page}" title="查看${p.name}详情">
      <img src="${imgSrc(p)}" alt="${p.name}"><b>${p.name}<span>${p.dept || ''} · P${p.page}</span></b>
    </button>`).join('')}</div>`;
}
function openPerson(page){
  const p = people.find(x => String(x.page) === String(page));
  if(!p) return;
  const rel = relationMatches(p);
  $('#personBody').innerHTML = `
    <div><img class="person-portrait" src="${imgSrc(p)}" alt="${p.name}"></div>
    <div>
      <div class="person-title">${p.name}</div>
      <span class="tag">${p.dept || '未标注部门'}</span><span class="tag">${p.eduGroup || '学历未标注'}</span><span class="tag">${p.region || '地域未标注'}</span>
      <div class="detail-list">
        <div class="detail-item"><b>出生年月</b>${fmt(p.birth)}</div>
        <div class="detail-item"><b>入职时间</b>${fmt(p.join)}</div>
        <div class="detail-item"><b>毕业院校</b>${p.school || '—'}</div>
        <div class="detail-item"><b>原画册页码</b>P${p.page}</div>
      </div>
      <div class="relation-block"><h4>同部门人物</h4>${miniCards(rel.sameDept)}</div>
      <div class="relation-block"><h4>同一年入职</h4>${miniCards(rel.sameYear)}</div>
      <div class="relation-block"><h4>同校毕业</h4>${miniCards(rel.sameSchool)}</div>
      <div class="relation-block"><h4>同地域院校</h4>${miniCards(rel.sameRegion)}</div>
    </div>`;
  $('#personModal').classList.add('open');
  $('#personModal').setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
  $('#personClose').focus();
}
function closePerson(){
  $('#personModal').classList.remove('open');
  $('#personModal').setAttribute('aria-hidden','true');
  $('#personBody').innerHTML = '';
  document.body.style.overflow = '';
}
function setMode(mode){
  const timeline = mode === 'timeline';
  $('#timelineSection').style.display = timeline ? 'block' : 'none';
  document.querySelector('section.section:nth-of-type(4)').style.display = timeline ? 'none' : 'block';
  $('#timelineModeBtn').classList.toggle('secondary', !timeline);
  $('#galleryModeBtn').classList.toggle('secondary', timeline);
}

fillOptions();
['input','change'].forEach(evt => document.body.addEventListener(evt, e => {
  if(['q','dept','year','region','edu'].includes(e.target.id)) render();
}));
document.body.addEventListener('click', e => {
  const bar = e.target.closest('.bar[data-filter]');
  if(!bar) return;
  const target = $('#' + bar.dataset.filter);
  if(target){ target.value = bar.dataset.value; render(); }
});
document.body.addEventListener('keydown', e => {
  if(e.key !== 'Enter' && e.key !== ' ') return;
  const bar = e.target.closest('.bar[data-filter]');
  if(!bar) return;
  e.preventDefault();
  const target = $('#' + bar.dataset.filter);
  if(target){ target.value = bar.dataset.value; render(); }
});


document.body.addEventListener('click', e => {
  const detail = e.target.closest('[data-detail]');
  if(detail){ openPerson(detail.dataset.detail); return; }
});
document.body.addEventListener('keydown', e => {
  if((e.key === 'Enter' || e.key === ' ') && e.target.matches('[data-detail]')){
    e.preventDefault();
    openPerson(e.target.dataset.detail);
  }
});
$('#randomBtn').addEventListener('click', () => {
  const list = getFilteredPeople();
  const pool = list.length ? list : people;
  openPerson(pool[Math.floor(Math.random() * pool.length)].page);
});
$('#timelineModeBtn').addEventListener('click', () => setMode('timeline'));
$('#galleryModeBtn').addEventListener('click', () => setMode('gallery'));
document.body.addEventListener('click', e => {
  if(e.target.id === 'personModal' || e.target.id === 'personClose') closePerson();
});

function openLightbox(img){
  const box = $('#lightbox');
  const big = $('#lightboxImg');
  big.src = img.src;
  big.alt = img.alt + ' 大图';
  $('#lightboxName').textContent = img.dataset.name || img.alt || '照片';
  $('#lightboxMeta').textContent = `${img.dataset.dept || ''} · 原画册页码：P${img.dataset.page || ''}`;
  box.classList.add('open');
  box.setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
  $('#lightboxClose').focus();
}
function closeLightbox(){
  const box = $('#lightbox');
  box.classList.remove('open');
  box.setAttribute('aria-hidden','true');
  $('#lightboxImg').src = '';
  document.body.style.overflow = '';
}
document.body.addEventListener('click', e => {
  const img = e.target.closest('.photo');
  if(img){ openLightbox(img); return; }
  if(e.target.id === 'lightbox' || e.target.id === 'lightboxClose') closeLightbox();
});
document.body.addEventListener('keydown', e => {
  if(e.key === 'Escape' && $('#lightbox').classList.contains('open')) closeLightbox();
  if(e.key === 'Escape' && $('#personModal').classList.contains('open')) closePerson();
  if((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('photo')){
    e.preventDefault();
    openLightbox(e.target);
  }
});
setMode('gallery');
render();
</script>
</body>
</html>
